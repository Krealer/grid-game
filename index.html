<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Dash</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="language-screen" aria-labelledby="language-title" aria-describedby="language-instruction">
    <div class="language-card" role="group" aria-label="Language selection options">
      <h1 id="language-title">Welcome to Grid Dash</h1>
      <p id="language-instruction">Please choose your language to continue.</p>

      <div class="language-options">
        <button type="button" class="language-option" data-language="en" lang="en">English</button>
        <button type="button" class="language-option" data-language="ja" lang="ja">日本語</button>
        <button type="button" class="language-option" data-language="ru" lang="ru">Русский</button>
        <button type="button" class="language-option" data-language="ar" lang="ar" dir="rtl">العربية</button>
      </div>

      <p class="language-status" id="language-status" aria-live="polite">No language selected yet.</p>
    </div>
  </section>

  <main class="game-shell" hidden>
    <header class="hud" aria-live="polite">
      <h1>Grid Dash</h1>
      <p class="hud__meta">
        <span>Score: <strong id="score">0</strong></span>
        <span>Lives: <strong id="lives">3</strong></span>
      </p>
    </header>

    <canvas
      id="game"
      width="360"
      height="360"
      aria-label="Grid Dash game area. Move with arrow keys or touch controls to collect stars and avoid enemies."
      role="img"
    >
      Your browser does not support canvas. Use a modern browser to play Grid Dash.
    </canvas>

    <section class="controls" aria-label="Touch controls">
      <button type="button" data-move="up" aria-label="Move up">▲</button>
      <div class="controls__row">
        <button type="button" data-move="left" aria-label="Move left">◀</button>
        <button type="button" data-move="down" aria-label="Move down">▼</button>
        <button type="button" data-move="right" aria-label="Move right">▶</button>
      </div>
    </section>

    <p id="status" class="status">Collect stars, dodge red bots.</p>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
