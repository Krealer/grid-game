<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Game</title>
  
  <!-- Link to our stylesheet for grid and tile visuals -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Responsive viewport settings -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="icon.png">
</head>
<body>

  <!-- Game title -->
  <h1>Grid Game</h1>

  <!-- Main game container -->
  <div id="game-container">

    <!-- Grid where tiles will be rendered (12x19 layout) -->
    <div id="grid" class="grid"></div>
  </div>

  <!-- Inventory UI (will be updated via JavaScript) -->
  <div id="inventory"></div>

  <!-- NPC dialog box (displays messages when talking to green tiles) -->
  <div id="dialog-box"></div>

  <!-- Main script (using type="module" so we can import other scripts) -->
  <script type="module" src="main.js"></script>
</body>
</html>
