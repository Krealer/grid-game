<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app" aria-live="polite">
    <section id="language-screen" class="screen" aria-labelledby="language-title">
      <div class="card">
        <h1 id="language-title"></h1>
        <p id="language-subtitle" class="subtitle"></p>

        <div class="language-options" role="group" aria-label="Language selection">
          <button type="button" class="language-option" data-language="en" lang="en">English</button>
          <button type="button" class="language-option" data-language="ja" lang="ja">日本語</button>
          <button type="button" class="language-option" data-language="ru" lang="ru">Русский</button>
          <button type="button" class="language-option" data-language="ar" lang="ar" dir="rtl">العربية</button>
        </div>
      </div>
    </section>

    <section id="menu-screen" class="screen" hidden aria-labelledby="menu-title">
      <div class="card">
        <button type="button" class="back-button" id="menu-back"></button>
        <h1 id="menu-title"></h1>
        <p id="menu-instruction" class="subtitle"></p>
        <ul class="menu-options">
          <li><button type="button" class="menu-option" id="menu-play"></button></li>
          <li><button type="button" class="menu-option" id="menu-medals"></button></li>
        </ul>
      </div>
    </section>

    <section id="medals-screen" class="screen" hidden aria-labelledby="medals-title">
      <div class="card">
        <h1 id="medals-title"></h1>
        <p id="medals-empty" class="subtitle"></p>
        <ul id="medals-list" class="menu-options medals-list" aria-live="polite"></ul>
        <button type="button" class="back-button" id="medals-back"></button>
      </div>
    </section>

    <section id="save-screen" class="screen" hidden aria-labelledby="save-title">
      <div class="card">
        <button type="button" class="back-button" id="save-back"></button>
        <h1 id="save-title"></h1>
        <p id="save-subtitle" class="subtitle"></p>
        <ul class="menu-options" id="save-slots"></ul>
      </div>
    </section>

    <section id="delete-confirm-screen" class="screen" hidden aria-labelledby="delete-confirm-message">
      <div class="card">
        <p id="delete-confirm-message" class="subtitle"></p>
        <ul class="menu-options">
          <li><button type="button" class="menu-option" id="delete-confirm-yes"></button></li>
          <li><button type="button" class="menu-option" id="delete-confirm-no"></button></li>
        </ul>
      </div>
    </section>

    <section id="element-screen" class="screen" hidden aria-labelledby="element-title">
      <div class="card">
        <button type="button" class="back-button" id="element-back"></button>
        <h1 id="element-title"></h1>
        <ul class="menu-options">
          <li><button type="button" class="menu-option element-option" data-element="fire"></button></li>
          <li><button type="button" class="menu-option element-option" data-element="water"></button></li>
          <li><button type="button" class="menu-option element-option" data-element="earth"></button></li>
        </ul>
      </div>
    </section>

    <section id="class-screen" class="screen" hidden aria-labelledby="class-title">
      <div class="card">
        <button type="button" class="back-button" id="class-back"></button>
        <h1 id="class-title"></h1>
        <ul class="menu-options">
          <li><button type="button" class="menu-option class-option" data-class="warrior"></button></li>
          <li><button type="button" class="menu-option class-option" data-class="mage"></button></li>
        </ul>
        <p id="class-confirmation" class="subtitle"></p>
      </div>
    </section>

    <section id="game-screen" class="screen" hidden aria-labelledby="game-title">
      <div class="card game-card">
        <h1 id="game-title"></h1>
        <p id="game-slot" class="subtitle"></p>
        <p id="game-helper" class="subtitle"></p>
        <div id="grid-board" class="grid-board" role="grid" aria-label="Gameplay grid"></div>
        <button type="button" class="menu-option game-menu-trigger" id="open-game-menu"></button>
      </div>
    </section>

    <section id="battle-screen" class="screen" hidden aria-labelledby="battle-title">
      <div class="card battle-card">
        <h1 id="battle-title"></h1>
        <div class="battle-status">
          <p id="battle-enemy-name" class="battle-text"></p>
          <p id="battle-enemy-stats" class="battle-text battle-text-muted"></p>
          <div class="hp-block">
            <p id="battle-enemy-hp" class="battle-text hp-label"></p>
            <div class="hp-bar-track" aria-hidden="true">
              <div id="battle-enemy-hp-fill" class="hp-bar-fill"></div>
            </div>
          </div>
        </div>
        <div class="battle-status battle-status-player">
          <p id="battle-player-name" class="battle-text"></p>
          <p id="battle-player-stats" class="battle-text battle-text-muted"></p>
          <div class="hp-block">
            <p id="battle-player-hp" class="battle-text hp-label"></p>
            <div class="hp-bar-track" aria-hidden="true">
              <div id="battle-player-hp-fill" class="hp-bar-fill"></div>
            </div>
          </div>
        </div>
        <div class="battle-arena" aria-label="Battle arena">
          <div class="battle-piece battle-player battle-player-warrior" aria-label="Player">
            <div class="character character--player character--warrior" aria-hidden="true">
              <div class="character__head"></div>
              <div class="character__hat"></div>
              <div class="character__torso"></div>
              <div class="character__armor"></div>
              <div class="character__arm character__arm--left"></div>
              <div class="character__arm character__arm--right"></div>
              <div class="character__leg character__leg--left"></div>
              <div class="character__leg character__leg--right"></div>
              <div class="character__weapon"></div>
            </div>
          </div>
          <div class="battle-piece battle-enemy battle-enemy-fire" aria-label="Enemy">
            <div class="slime slime--fire" aria-hidden="true">
              <div class="slime__body">
                <div class="slime__shine"></div>
                <div class="slime__eye slime__eye--left"></div>
                <div class="slime__eye slime__eye--right"></div>
              </div>
            </div>
          </div>
        </div>
        <p id="battle-subtitle" class="subtitle battle-subtitle"></p>
        <ul class="menu-options battle-options" id="battle-options-list"></ul>
      </div>
    </section>

    <section id="dialogue-screen" class="screen" hidden aria-labelledby="dialogue-title">
      <div class="card dialogue-card" id="dialogue-area" role="button" tabindex="0" aria-live="polite">
        <h1 id="dialogue-title"></h1>
        <div class="dialogue-stage" aria-label="Dialogue stage">
          <div class="dialogue-speaker dialogue-speaker-player" aria-label="Player">
            <div class="dialogue-bubble" id="dialogue-player-bubble" aria-hidden="true"></div>
            <div class="dialogue-head portrait portrait--player portrait--warrior" id="dialogue-player-avatar">
              <div class="portrait__head"></div>
              <div class="portrait__hat"></div>
              <div class="portrait__armor"></div>
            </div>
          </div>
          <div class="dialogue-speaker dialogue-speaker-npc" aria-label="NPC">
            <div class="dialogue-bubble" id="dialogue-npc-bubble" aria-hidden="true"></div>
            <div class="dialogue-head portrait portrait--npc">
              <div class="portrait__head"></div>
              <div class="portrait__hat"></div>
              <div class="portrait__armor"></div>
            </div>
          </div>
        </div>
        <p id="dialogue-speaker" class="dialogue-speaker-label"></p>
        <p id="dialogue-line" class="subtitle dialogue-line"></p>
        <ul id="dialogue-choices" class="menu-options dialogue-choices" aria-label="Dialogue choices"></ul>
        <p id="dialogue-helper" class="subtitle"></p>
      </div>
    </section>

    <section id="victory-screen" class="screen" hidden aria-labelledby="victory-title">
      <div class="card">
        <h1 id="victory-title"></h1>
        <p id="victory-message" class="subtitle"></p>
        <button type="button" class="menu-option" id="victory-continue"></button>
      </div>
    </section>

    <section id="defeat-screen" class="screen" hidden aria-labelledby="defeat-title">
      <div class="card">
        <h1 id="defeat-title"></h1>
        <button type="button" class="menu-option" id="defeat-main-menu"></button>
      </div>
    </section>

    <section id="game-menu-screen" class="screen" hidden aria-labelledby="game-menu-title">
      <div class="card">
        <h1 id="game-menu-title"></h1>
        <p id="game-menu-status" class="subtitle"></p>
        <ul class="menu-options">
          <li><button type="button" class="menu-option" id="gm-back-to-game"></button></li>
          <li><button type="button" class="menu-option" id="gm-party"></button></li>
          <li><button type="button" class="menu-option" id="gm-inventory"></button></li>
          <li><button type="button" class="menu-option" id="gm-info"></button></li>
          <li><button type="button" class="menu-option" id="gm-settings"></button></li>
          <li><button type="button" class="menu-option" id="gm-save"></button></li>
          <li><button type="button" class="menu-option" id="gm-save-quit"></button></li>
          <li><button type="button" class="menu-option" id="gm-quit"></button></li>
        </ul>
      </div>
    </section>

    <section id="settings-screen" class="screen" hidden aria-labelledby="settings-title">
      <div class="card">
        <h1 id="settings-title"></h1>
        <ul class="menu-options">
          <li>
            <button type="button" class="menu-option" id="settings-toggle-coordinates"></button>
          </li>
        </ul>
        <button type="button" class="back-button" id="settings-back"></button>
      </div>
    </section>

    <section id="inventory-screen" class="screen" hidden aria-labelledby="inventory-title">
      <div class="card">
        <h1 id="inventory-title"></h1>
        <p id="inventory-helper" class="subtitle"></p>
        <button type="button" class="back-button" id="inventory-back"></button>
      </div>
    </section>

    <section id="party-screen" class="screen" hidden aria-labelledby="party-title">
      <div class="card">
        <h1 id="party-title"></h1>
        <div class="party-section">
          <h2 id="party-active-title" class="party-section-title"></h2>
          <ul id="party-active-list" class="menu-options party-list" aria-live="polite"></ul>
          <p id="party-active-empty" class="subtitle"></p>
        </div>
        <div class="party-section">
          <h2 id="party-recruited-title" class="party-section-title"></h2>
          <ul id="party-recruited-list" class="menu-options party-list" aria-live="polite"></ul>
          <p id="party-recruited-empty" class="subtitle"></p>
        </div>
        <button type="button" class="back-button" id="party-back"></button>
      </div>
    </section>

    <section id="info-screen" class="screen" hidden aria-labelledby="info-title">
      <div class="card">
        <h1 id="info-title"></h1>
        <p id="info-helper" class="subtitle"></p>
        <p id="info-details" class="subtitle info-details"></p>
        <button type="button" class="back-button" id="info-back"></button>
      </div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
